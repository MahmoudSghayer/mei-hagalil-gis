<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>מי הגליל | יומן עריכות GIS</title>
  <link rel="stylesheet" href="../css/shared.css?v=1"/>
  <style>
    #content{max-width:1100px;margin:0 auto;padding:18px;}
    .gl-bar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin:12px 0;}
    .gl-bar select,.gl-bar input{border:1px solid #e2e8f0;border-radius:8px;padding:7px 10px;font-size:13px;direction:rtl;}
    #gl-wrap{overflow:auto;border:1px solid #e2e8f0;border-radius:10px;background:#fff;}
    #gl-table{border-collapse:collapse;width:100%;font-size:12.5px;direction:rtl;}
    #gl-table th{position:sticky;top:0;background:#0d3b5e;color:#fff;text-align:right;padding:9px 12px;white-space:nowrap;font-size:11.5px;}
    #gl-table td{padding:8px 12px;border-top:1px solid #f1f5f9;vertical-align:top;}
    #gl-table tr:hover td{background:#f8fafc;}
    .gl-act{display:inline-block;font-size:11px;font-weight:700;padding:2px 8px;border-radius:999px;white-space:nowrap;}
    .gl-act.ins{background:#dcfce7;color:#166534;} .gl-act.upd{background:#dbeafe;color:#1e40af;}
    .gl-act.del{background:#fee2e2;color:#991b1b;} .gl-act.col{background:#fef3c7;color:#92400e;}
    .gl-det{color:#475569;font-size:12px;line-height:1.5;max-width:420px;white-space:normal;}
    .gl-det b{color:#0d3b5e;} .gl-old{color:#dc2626;} .gl-new{color:#16a34a;}
    .gl-empty{padding:26px;text-align:center;color:#94a3b8;}
    .gl-user{font-weight:600;color:#0d3b5e;}
    .gl-more{margin:14px auto;display:block;}
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.108.2/dist/umd/supabase.js" integrity="sha384-nD3dwv4+ZqdYnmZKe/249ImlV04om7xTCcsoSeQYI+RO+XlKPoqAWaJR1M5SJH9p" crossorigin="anonymous"></script>
  <script src="../js/auth.js?v=1"></script>
  <script defer src="../js/a11y.js?v=1"></script>
</head>
<body>
<div id="topbar">
  <div class="logo">💧 מי <span>הגליל</span> | יומן עריכות GIS</div>
  <div class="topbar-right">
    <span class="badge-admin">מנהל מערכת</span>
    <a href="../index.html" class="topbar-btn solid">למפה</a>
    <a href="upload.html" class="topbar-btn">העלאת שכבות</a>
    <a href="admin.html" class="topbar-btn">ניהול</a>
    <button class="topbar-btn" onclick="logout()">התנתק</button>
  </div>
</div>

<div id="content">
  <h1>יומן עריכות — GIS Engine</h1>
  <p class="page-sub">כל פעולה במנוע (הוספה / עריכה / מחיקה של פיצ'רים ועמודות) נרשמת אוטומטית עם המשתמש שביצע אותה.</p>

  <div class="gl-bar">
    <label>סוג פעולה:
      <select id="gl-filter" onchange="loadLogs(true)">
        <option value="">הכל</option>
        <option value="feature_update">עריכת ערך</option>
        <option value="feature_insert">הוספת שורה</option>
        <option value="feature_delete">מחיקת שורה</option>
        <option value="field_add">הוספת עמודה</option>
        <option value="field_rename">שינוי שם עמודה</option>
        <option value="field_delete">מחיקת עמודה</option>
      </select>
    </label>
    <input id="gl-search" placeholder="חיפוש (שכבה / asset / משתמש)…" oninput="renderRows()"/>
    <button class="topbar-btn" onclick="loadLogs(true)">↻ רענן</button>
    <span id="gl-count" style="color:#64748b;font-size:12px"></span>
  </div>

  <div id="gl-wrap"><table id="gl-table"></table></div>
  <button class="btn-secondary gl-more" id="gl-more" style="display:none" onclick="loadLogs(false)">טען עוד</button>
</div>

<script src="../js/pages/gis-logs.js?v=1"></script>
</body>
</html>
