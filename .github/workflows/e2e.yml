name: E2E (Playwright)

# Runs against the deployed app. Manual + weekly so it never blocks per-push CI
# or deploys. RBAC specs auto-skip unless the MGIS_VIEWER_* secrets are set.
# The write-gated specs (import-flow/table-flow/export-area/realtime —
# tests/e2e/helpers.js writeGateReason()) auto-skip unless BOTH
# MGIS_ADMIN_EMAIL/MGIS_ADMIN_PASSWORD AND MGIS_E2E_WRITE=1 are set — they
# create + delete a handful of self-marked ("E2E-<runId>") rows against the
# LIVE database, so MGIS_E2E_WRITE is a deliberate second opt-in, not just a
# missing-secret skip.
on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1'   # Mondays 06:00 UTC

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
      - name: Install Playwright
        run: |
          npm i -D @playwright/test@^1.49
          npx playwright install --with-deps chromium
      - name: Run E2E
        env:
          BASE_URL: https://mei-hagalil-gis.vercel.app
          MGIS_VIEWER_EMAIL: ${{ secrets.MGIS_VIEWER_EMAIL }}
          MGIS_VIEWER_PASSWORD: ${{ secrets.MGIS_VIEWER_PASSWORD }}
          # Write-gated specs (see comment above) — unset/false by default so
          # this workflow stays read-only until someone deliberately opts in.
          MGIS_ADMIN_EMAIL: ${{ secrets.MGIS_ADMIN_EMAIL }}
          MGIS_ADMIN_PASSWORD: ${{ secrets.MGIS_ADMIN_PASSWORD }}
          MGIS_E2E_WRITE: ${{ secrets.MGIS_E2E_WRITE }}
        run: npx playwright test
