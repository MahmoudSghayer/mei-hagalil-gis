name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  javascript:
    name: JS — syntax check + Vitest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
      - run: npm install
      - name: Syntax-check all JS
        run: |
          find api js gis-engine -name '*.js' -not -path '*/node_modules/*' -print0 \
            | xargs -0 -n1 node --check
      - name: Unit tests
        run: npm test

  python:
    name: Python — DWG service tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dwg-export
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt
      - name: Run tests
        run: pytest -q
