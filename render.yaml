services:
  - type: web
    name: mei-hagalil-gis-dwg-export
    runtime: docker
    rootDir: dwg-export
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    plan: free             # upgrade to starter ($7/mo) to avoid sleep/wake delay
    envVars:
      - key: API_TOKEN
        generateValue: true   # Render auto-generates a secure token
